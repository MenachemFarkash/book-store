<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/main.css" />
        <script src="js/controllers/book.controller.js" defer></script>
        <script src="js/services/book.service.js" defer></script>
        <script src="js/controllers/store.controller.js" defer></script>
        <script src="js/services/localStorage.service.js" defer></script>
        <script src="js/utils/book.utils.js" defer></script>
        <title>Document</title>
    </head>
    <body onload="onInit()">
        <form class="filter-container" onsubmit="event.preventDefault()">
            <fieldset>
                <legend>Filter</legend>
                <label for="search-input">Title</label>
                <input
                    class="search-input"
                    type="text"
                    id="search-input"
                    placeholder="Search books..."
                    oninput="onSetFilterBy()"
                />
                <label for="min-rating">Min Rating</label>
                <select class="min-rating" name="min-rating" id="" onchange="onSetFilterBy()">
                    <option value="0">ALL</option>
                    <option value="1">⭐+</option>
                    <option value="2">⭐⭐+</option>
                    <option value="3">⭐⭐⭐+</option>
                    <option value="4">⭐⭐⭐⭐+</option>
                    <option value="5">⭐⭐⭐⭐⭐</option>
                </select>
                <button onclick="onClearFilter()">Clear</button>
            </fieldset>
        </form>
        <form class="sort-container" onsubmit="event.preventDefault()">
            <fieldset>
                <legend>Sort</legend>

                <label for="sort-by">Sort By</label>
                <select class="sort-by" name="sort-by" id="" onchange="onSetSortBy()">
                    <option value="">Default</option>
                    <option value="title">Title</option>
                    <option value="price">Price</option>
                    <option value="rating">Rating</option>
                </select>

                <label for="sort-dir">Ascending?</label>
                <input class="sort-dir" type="checkbox" name="sort-dir" onchange="onSetSortBy()" />
                <button onclick="onClearSort()">Clear</button>

                <label for="books-per-page">Books Per Page</label>
                <input
                    class="books-per-page"
                    type="number"
                    name="books-per-page"
                    id="books-per-page"
                    min="1"
                    value="5"
                    onchange="onSetBooksPerPage()"
                />
            </fieldset>
        </form>
        <main class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Rating</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <button onclick="onOpenEditModal(0, true)">Add New Book</button>

            <section class="pagination">
                <button onclick="onPrevPage()">Previous</button>
                <span
                    >Page <span class="page-number">1</span> of
                    <span class="total-pages">1</span></span
                >
                <button onclick="onNextPage()">Next</button>
            </section>

            <div class="edit-book-modal hidden" data-bookId="0">
                <h1>Edit Book</h1>
                <span>
                    <label for="book-title">Title</label>
                    <input type="text" id="book-title" />
                </span>
                <span>
                    <label for="book-price">Price</label>
                    <input type="number" id="book-price" />
                </span>
                <button onclick="onUpdateBook()">Save</button>
                <button class="close-button" onclick="onCloseModal()">Cancel</button>
            </div>

            <div class="book-details-modal hidden">
                <img src="https://placehold.co/400x600" alt="" />
                <h1>Book Title</h1>
                <h2>120</h2>
                <h2>5</h2>
                <button class="close-button" onclick="onCloseModal()">X</button>
            </div>
            <div class="message-modal hidden">
                <p>Success!</p>
            </div>
        </main>
    </body>
</html>
