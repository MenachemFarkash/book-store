<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/main.css" />
        <script src="js/controllers/book.controller.js" defer></script>
        <script src="js/controllers/store.controller.js" defer></script>
        <script src="js/services/book.service.js" defer></script>
        <script src="js/services/localStorage.service.js" defer></script>
        <script src="js/utils/book.utils.js" defer></script>
        <title>Document</title>
    </head>
    <body onload="renderBooks()">
        <main class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button onclick="onAddBook()">Add New Book</button>
            <div class="book-details-modal hidden">
                <img src="https://placehold.co/400x600" alt="" />
                <h1>Book Title</h1>
                <h2>120</h2>
                <button class="close-button" onclick="onCloseModal()">X</button>
            </div>
        </main>
    </body>
